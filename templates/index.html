<!doctype html>
<html>
  <head>
    <title>Karla Chatbot</title>

    <style>
      body {
        font-family: Arial;
      }

      #chat-button {
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: #22c55e;
        color: white;
        border: none;
        cursor: pointer;
      }

      #chat-box {
        position: fixed;
        bottom: 90px;
        right: 20px;
        width: 320px;
        height: 420px;
        background: white;
        border-radius: 10px;
        display: none;
        flex-direction: column;
        border: 1px solid #ccc;
      }

      #header {
        background: #22c55e;
        color: white;
        padding: 10px;
        text-align: center;
      }

      #chat {
        flex: 1;
        padding: 10px;
        overflow-y: auto;
      }

      .msg {
        margin: 5px;
        padding: 8px;
        border-radius: 8px;
      }
      .user {
        background: #dcfce7;
        text-align: right;
      }
      .bot {
        background: #f1f5f9;
      }

      .input-area {
        display: flex;
      }

      input {
        flex: 1;
        padding: 10px;
        border: none;
      }
      button.send {
        background: #22c55e;
        color: white;
        border: none;
        padding: 10px;
      }
    </style>
  </head>

  <body>
    <button id="chat-button" onclick="toggleChat()">Chat</button>

    <div id="chat-box">
      <div id="header">Karla</div>
      <div id="chat"></div>

      <div class="input-area">
        <input id="msg" placeholder="Ask something..." />
        <button class="send" onclick="send()">Send</button>
      </div>
    </div>

    <script>
      let started = false;

      function toggleChat() {
        const box = document.getElementById("chat-box");
        const chat = document.getElementById("chat");

        if (box.style.display !== "flex") {
          box.style.display = "flex";

          if (!started) {
            chat.innerHTML += `<div class="msg bot">Karla: Hello, I am Karla. How can I help you?</div>`;
            started = true;
          }
        } else {
          box.style.display = "none";
        }
      }

      async function send() {
        let input = document.getElementById("msg");
        let msg = input.value.trim();
        if (!msg) return;

        let chat = document.getElementById("chat");

        chat.innerHTML += `<div class="msg user">${msg}</div>`;

        let res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: msg }),
        });

        let data = await res.json();

        chat.innerHTML += `<div class="msg bot">${data.reply}</div>`;

        input.value = "";
        chat.scrollTop = chat.scrollHeight;
      }
    </script>
  </body>
</html>
